---
name: sync-skills

on:
  schedule:
    - cron: "7 8 * * 1" # Weekly Monday 08:07 UTC
  push:
    branches: [main]
    paths: [".agents/skills/**"]
  workflow_dispatch:
permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-24.04
    environment: ack
    strategy:
      fail-fast: false
      matrix:
        repo:
          - ansible/ansible-compat
          - ansible/ansible-creator
          - ansible/ansible-dev-environment
          - ansible/ansible-dev-tools
          - ansible/ansible-lint
          - ansible/ansible-navigator
          - ansible/molecule
          - ansible/pytest-ansible
          - ansible/tox-ansible
          - ansible/vscode-ansible
    steps:
      - name: Checkout team-devtools (source)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: source
          sparse-checkout: .agents/skills

      - name: Checkout target repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.BOT_PAT }}
          path: target

      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_committer_name: "ansibuddy"
          git_committer_email: "107943535+ansibuddy@users.noreply.github.com"
          workdir: target

      - name: Sync skills to target repo
        run: |
          mkdir -p target/.agents/skills
          rsync -a --delete source/.agents/skills/ target/.agents/skills/

      - name: Create PR if changed
        working-directory: target
        env:
          SOURCE_SHA: ${{ github.sha }}
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          git add .agents/skills/
          git diff --quiet --cached && exit 0

          REPO_NAME="${{ matrix.repo }}"
          BRANCH="chore/sync-agent-skills"

          git checkout -B "${BRANCH}"
          git commit -S -m "chore: sync agent skills from team-devtools

          Source: ansible/team-devtools@${SOURCE_SHA}"
          git push --force origin "${BRANCH}"

          # update existing PR or open a new one
          if gh pr list --repo "${REPO_NAME}" --head "${BRANCH}" --state open --json number --jq '.[0].number' | grep -q .; then
            echo "PR already exists for ${BRANCH}, force-pushed update."
          else
            gh pr create \
              --repo "${REPO_NAME}" \
              --head "${BRANCH}" \
              --title "chore: sync agent skills from team-devtools" \
              --body "$(cat <<PREOF
          Automated sync of \`.agents/skills/\` from \`ansible/team-devtools\`.

          Source: ansible/team-devtools@${SOURCE_SHA}
          PREOF
          )"
          fi
