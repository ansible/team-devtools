---
name: sync-skills-cleanup

# One-time cleanup: close old sync PRs and remove .agents/skills/
# from downstream repos. Delete this workflow after it runs successfully.
on:
  workflow_dispatch:
permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    environment: ack
    strategy:
      fail-fast: false
      matrix:
        repo:
          - ansible/ansible-compat
          - ansible/ansible-creator
          - ansible/ansible-dev-environment
          - ansible/ansible-dev-tools
          - ansible/ansible-lint
          - ansible/ansible-navigator
          - ansible/molecule
          - ansible/pytest-ansible
          - ansible/tox-ansible
          - ansible/vscode-ansible
    steps:
      - name: Checkout target repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.BOT_PAT }}

      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_committer_name: "ansibuddy"
          git_committer_email: "107943535+ansibuddy@users.noreply.github.com"

      - name: Close open sync PRs
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          REPO="${{ matrix.repo }}"
          BRANCH="chore/sync-agent-skills"

          PR_NUM=$(gh pr list --repo "${REPO}" --head "${BRANCH}" \
            --state open --json number --jq '.[0].number')
          if [ -n "${PR_NUM}" ]; then
            gh pr close "${PR_NUM}" --repo "${REPO}" \
              --comment "Closing: agent skills are no longer synced to downstream repos. They live in ansible/team-devtools."
            git push origin --delete "${BRANCH}" 2>/dev/null || true
            echo "Closed PR #${PR_NUM} and deleted branch ${BRANCH}."
          else
            echo "No open sync PR found."
          fi

      - name: Open cleanup PR if .agents/skills exists
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          REPO="${{ matrix.repo }}"
          CLEANUP_BRANCH="chore/remove-synced-skills"

          if [ ! -d ".agents/skills" ]; then
            echo "No .agents/skills directory — nothing to clean up."
            exit 0
          fi

          git checkout -B "${CLEANUP_BRANCH}"
          git rm -rf .agents/skills
          git commit -S -m "chore: remove previously-synced agent skills

          Skills now live exclusively in ansible/team-devtools.
          See: https://github.com/ansible/team-devtools/tree/main/.agents/skills"
          git push --force origin "${CLEANUP_BRANCH}"

          EXISTING=$(gh pr list --repo "${REPO}" --head "${CLEANUP_BRANCH}" \
            --state open --json number --jq '.[0].number')
          if [ -n "${EXISTING}" ]; then
            echo "Cleanup PR #${EXISTING} already exists, force-pushed update."
          else
            gh pr create \
              --repo "${REPO}" \
              --head "${CLEANUP_BRANCH}" \
              --title "chore: remove previously-synced agent skills" \
              --body "Agent skills now live exclusively in \`ansible/team-devtools\`. This PR removes the copies that were previously synced here."
            echo "Created cleanup PR."
          fi
