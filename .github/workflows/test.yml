---
name: test
on:
  merge_group:
    branches:
      - main
  push:
    branches: # any integration branch but not tag
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish a pre-release"
        required: false
        default: "false"
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    environment:
      name: ack # BOT_PAT
      deployment: false
    permissions:
      # git commit/push use BOT_PAT from checkout; GITHUB_TOKEN only comments
      pull-requests: write # comment on unfixed lint errors
    steps:
      - name: Dump event information
        run: |
          echo "github.event_name: ${{ github.event_name }}"
          echo "github.ref: ${{ github.ref }}"
          echo "github.ref_name: ${{ github.ref_name }}"
          echo "github.ref_type: ${{ github.ref_type }}"
          echo "github.event.action: ${{ github.event.action }}"
          echo "github.event.inputs: ${{ github.event.inputs }}"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          token: ${{ secrets.BOT_PAT }}

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - uses: j178/prek-action@5337cb91e0fa35a7ff31b9ca345126d8bbbcdf16 # v2.0.6
        id: prek
        with:
          extra-args: --config .pre-commit-config.yaml --all-files
        continue-on-error: true

      - name: Import GPG Key
        if: steps.prek.outcome == 'failure'
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_committer_name: "ansibuddy"
          git_committer_email: "107943535+ansibuddy@users.noreply.github.com"

      - name: Commit & push changes
        id: commit-and-push
        if: steps.prek.outcome == 'failure'
        run: |
          git add .
          git status
          git commit -S -m "chore[bot]: auto-fix lint errors"
          git push

      - name: react if linting errors were not fixed
        if: steps.commit-and-push.outcome  == 'failure'
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            @${{ github.actor }} I tried to fix the linting errors, but it didn't work. Please fix them manually.
            See [CI log](https://github.com/${{ github.repository_owner }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for more details.

  test:
    needs:
      - lint
    permissions:
      checks: read
      contents: read
      id-token: write
      packages: write # some tox environments might produce containers
      pull-requests: write # allow commenting on unsigned commits
    # tests reusable tox workflow
    uses: ./.github/workflows/tox.yml
    with:
      default_python: "3.13"
      max_python: "3.14"
      min_python: "3.13"
      run_post: echo 'Running post'
      run_pre: echo 'Running pre'
      other_names: |
        docs
        lint
        py-mise-macos:tox -e py:runner=macos-15;mise=true
        py-mise-ubuntu:tox -e py:runner=ubuntu-24.04;mise=true
        py313-py314-macos:tox -e py313,py314:runner=macos-15
      platforms: linux
      node-version-file: .tool-versions
    secrets: inherit

  check: # This job does nothing and is only used for the branch protection
    if: always()
    needs:
      - test
    runs-on: ubuntu-24.04
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
  push:
    if: github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: read
    uses: ./.github/workflows/push.yml
    secrets: inherit
