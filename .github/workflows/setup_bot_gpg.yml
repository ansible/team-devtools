---
name: setup-bot-gpg
on:
  workflow_dispatch:
permissions:
  contents: read

jobs:
  upload-gpg-key:
    runs-on: ubuntu-24.04
    environment: ack
    steps:
      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
        id: gpg
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}

      - name: Upload GPG public key to bot GitHub account
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
          GPG_FINGERPRINT: ${{ steps.gpg.outputs.fingerprint }}
        run: |
          PUBLIC_KEY=$(gpg --armor --export "$GPG_FINGERPRINT")
          RESPONSE=$(gh api user/gpg_keys -f armored_public_key="$PUBLIC_KEY" 2>&1) || {
            echo "::error::Failed to upload GPG key: $RESPONSE"
            exit 1
          }
          KEY_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "GPG public key uploaded successfully (key ID: $KEY_ID)"

          echo "## Verifying upload" >> "$GITHUB_STEP_SUMMARY"
          WHOAMI=$(gh api user --jq '.login')
          KEYS=$(gh api "users/${WHOAMI}/gpg_keys" --jq '.[].key_id')
          echo "Bot account: $WHOAMI" >> "$GITHUB_STEP_SUMMARY"
          echo "GPG keys on account: $KEYS" >> "$GITHUB_STEP_SUMMARY"
