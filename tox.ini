[tox]
minversion = 4.6.3
envlist =
    lint
    docs
    ubi8
    ubi9
isolated_build = True
requires =
  tox>=4.21.2
  tox-uv >= 1.16.0

[testenv]
commands =
  coverage run -m pytest {posargs:\
    -n auto \
    -ra \
    --showlocals \
    --doctest-modules \
    --durations=10 \
    }
  {py,py310,py311,py312,py313}: sh -c "coverage combine -a -q --data-file={envdir}/.coverage {toxworkdir}/*/.coverage.* && coverage xml --data-file={envdir}/.coverage -o {envdir}/coverage.xml --fail-under=0"
setenv =
  COVERAGE_FILE = {env:COVERAGE_FILE:{envdir}/.coverage.{envname}}
  COVERAGE_PROCESS_START={toxinidir}/pyproject.toml
skip_install = false
usedevelop = false
changedir = {toxinidir}
allowlist_externals =
  sh

[testenv:docs]
description = Build docs
deps =
    -r requirements.in
    ansible-core
passenv =
    *
commands =
    ; ansible-playbook -i localhost, playbooks/sync.yml
    {envpython} -m mkdocs {posargs:build --strict --site-dir=_readthedocs/html/}
skip_install = true
usedevelop = false

[testenv:lint]
description = Runs all linting tasks
basepython = python3.12
commands =
    # to run a single linter you can do "pre-commit run flake8"
    python3 -m pre_commit run {posargs:--all}
deps =
    pre-commit>=4.0.1
    pre-commit-uv>=4.1.4
extras =
skip_install = true
usedevelop = false

[testenv:{ubi8,ubi9}]
description = Building container using beta RPMs (requires VPN) {envname}
changedir = test/{envname}
commands =
    podman build --tag adt-{envname} {posargs} .
    podman run -it adt-{envname} adt --version
allowlist_externals =
    podman
